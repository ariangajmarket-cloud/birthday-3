<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تولد فانتزی و رنگارنگ</title>
    <!-- فونت وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <style>
        :root {
            --bg-gradient-start: #4a00e0;
            --bg-gradient-end: #8e2de2;
            --secondary-color: #f1c40f; /* طلایی */
            --gift-box-red: #e74c3c; /* قرمز جعبه */
            --gift-lid-red: #c0392b;
            --text-color: #333;
            /* رنگ‌های فانتزی کیک */
            --cake-pink: #ffb7b2;
            --cake-cream: #fff0f5;
            --cake-blue: #b5ead7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            background: radial-gradient(circle, var(--bg-gradient-end), var(--bg-gradient-start));
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            user-select: none;
            /* Adding cursor pointer to indicate interactivity */
            cursor: pointer;
        }

        /* --- Canvas for Effects --- */
        #effects-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- Main Stage --- */
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
            /* Ensure clicks pass through stage container to body if needed, 
               or handle on body directly */
        }

        /* --- Countdown (Fixed Position) --- */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: 40px;
            
            font-size: 8rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 2px 2px 0px #5b2c6f;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            
            width: 2em; 
            text-align: center;
        }
        #countdown.active {
            opacity: 1;
        }

        /* --- Fantasy/Cute Cake Design --- */
        .cake-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* Cursor pointer handled by body, but keep fallback */
            cursor: pointer;
            transition: transform 1s ease-in-out, opacity 0.5s;
            z-index: 20;
        }

        .cake-container.moved-aside {
            transform: translateX(-120vw);
            opacity: 0;
            pointer-events: none;
        }

        /* لایه پایین */
        .cake-layer-bottom {
            position: absolute;
            bottom: 0;
            width: 200px;
            height: 70px;
            background: var(--cake-pink);
            border-radius: 30px 30px 15px 15px;
            z-index: 1;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(255,255,255,0.4) 4px, rgba(255,255,255,0.4) 8px);
        }

        /* لایه میانی */
        .cake-layer-middle {
            position: absolute;
            bottom: 60px;
            width: 160px;
            height: 50px;
            background: var(--cake-cream);
            border-radius: 20px 20px 10px 10px;
            z-index: 2;
            border-bottom: 4px solid #ffdde1;
        }

        /* لایه بالا (با چهره) */
        .cake-layer-top {
            position: absolute;
            bottom: 100px;
            width: 120px;
            height: 50px;
            background: var(--cake-blue);
            border-radius: 20px 20px 10px 10px;
            z-index: 3;
            position: relative;
        }

        /* چهره بامزه */
        .cake-face {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .eye {
            width: 8px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            position: relative;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
        }
        .mouth {
            width: 12px;
            height: 6px;
            border-bottom: 2px solid #333;
            border-radius: 0 0 10px 10px;
        }

        /* خامه‌ها */
        .cream-dollop {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 2px rgba(0,0,0,0.1);
            z-index: 4;
        }
        .cream-1 { width: 25px; height: 15px; top: -8px; left: 10px; }
        .cream-2 { width: 25px; height: 15px; top: -8px; right: 10px; }
        .cream-3 { width: 30px; height: 18px; top: -12px; left: 50%; transform: translateX(-50%); }

        /* شمع */
        .candle {
            position: absolute;
            bottom: 145px;
            width: 12px;
            height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 3px, #ffcccb 3px, #ffcccb 6px);
            border-radius: 4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            border: 1px solid #eee;
        }
        
        .flame {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 20px;
            background: radial-gradient(ellipse at bottom, #ffeb3b 0%, #ff9800 50%, transparent 80%);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.5s infinite alternate;
            opacity: 1;
            transition: opacity 0.5s;
        }
        .flame.off {
            opacity: 0;
        }
        
        /* متن روی کیک */
        .cake-overlay-text {
            position: absolute;
            top: -70px;
            width: 200%;
            left: -50%;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff; /* رنگ پیش‌فرض سفید */
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            animation: bounce 2s infinite;
            z-index: 10;
            line-height: 1.5;
            transition: color 0.5s, text-shadow 0.5s; /* انیمیشن نرم برای تغییر رنگ */
        }

        /* کلاس جدید برای متن طلایی */
        .cake-overlay-text.gold {
            color: #ffd700; /* طلایی */
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 2px 2px 0px rgba(100, 0, 150, 0.5);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- RED Gift Box --- */
        .gift-container {
            position: absolute;
            bottom: 10%;
            width: 150px;
            height: 150px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
        }
        .gift-box {
            position: relative;
            width: 120px;
            height: 120px;
            background: var(--gift-box-red);
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gift-box:active { transform: scale(0.95); }
        .gift-box::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 100%;
            background: var(--secondary-color);
        }
        .gift-box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 25px;
            background: var(--secondary-color);
        }
        .gift-lid {
            position: absolute;
            top: -10px;
            width: 130px;
            height: 30px;
            background: var(--gift-lid-red);
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 16;
            display: flex;
            justify-content: center;
        }
        .gift-lid::after {
            content: '';
            width: 30px;
            height: 30px;
            background: var(--secondary-color);
            border-radius: 5px;
        }
        
        .gift-container.open .gift-lid {
            transform: translateY(-60px) rotate(-10deg);
            opacity: 0;
        }
        .gift-container.shake {
            animation: shake 0.5s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        /* --- Cards Display Area (Horizontal) --- */
        .cards-display-area {
            position: absolute;
            bottom: 35%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            height: 150px;
            z-index: 20;
            padding: 0 20px;
            flex-direction: row;
            flex-wrap: nowrap;
        }

        .card {
            color: #333;
            width: 70px;
            height: 100px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px;
            transform: translateY(200px);
            opacity: 0;
            transition: transform 0.5s ease-out, opacity 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--bg-gradient-end);
        }

        .card.visible {
            transform: translateY(0);
            opacity: 1;
        }
        
        .card:active { transform: scale(0.95); }

        .card.golden {
            background: linear-gradient(135deg, #ffd700, #fdb931);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border: 2px solid #fff;
            border-bottom: none;
        }

        /* --- Card Colors (Custom) --- */
        .card.card-0 { /* کارت اول */
            background-color: #F9A9F9;
        }
        .card.card-1 { /* کارت دوم */
            background-color: #FFFB66;
        }
        .card.card-2 { /* کارت سوم */
            background-color: #B9F9A9;
        }


        /* --- Message Overlay --- */
        #message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 26, 71, 0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        #message-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .message-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border-top: 10px solid var(--bg-gradient-end);
        }
        #message-overlay.active .message-card {
            transform: scale(1);
        }
        .message-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
        }
        .tap-hint {
            font-size: 0.9rem;
            color: var(--bg-gradient-end);
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* --- Magical Glow --- */
        body.magical-mode {
            animation: bg-pulse 5s infinite alternate;
        }
        @keyframes bg-pulse {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }
        .magical-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.2) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s;
            z-index: 5;
        }
        .magical-glow.active {
            opacity: 1;
        }

        /* Responsive */
        @media (min-width: 600px) {
            .cake-container { width: 300px; height: 300px; }
            .cake-layer-bottom { width: 240px; height: 80px; }
            .cake-layer-middle { width: 190px; height: 60px; bottom: 70px; }
            .cake-layer-top { width: 140px; height: 60px; bottom: 120px; }
            .candle { bottom: 170px; }
            .card { width: 100px; height: 140px; font-size: 1rem; }
            .message-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Canvas for Balloons and Confetti -->
    <canvas id="effects-canvas"></canvas>

    <!-- Magical Glow Layer -->
    <div class="magical-glow" id="glow-layer"></div>

    <!-- Countdown Display -->
    <div id="countdown">3</div>

    <!-- Main Stage -->
    <div id="stage">
        
        <!-- Step 0: Fantasy Cute Cake -->
        <div class="cake-container" id="cake">
            <div class="cake-overlay-text">شمع را فوت کن</div>
            <div class="candle">
                <div class="flame" id="flame"></div>
            </div>
            <div class="cake-layer-top">
                <div class="cream-dollop cream-1"></div>
                <div class="cream-dollop cream-2"></div>
                <div class="cream-dollop cream-3"></div>
                <div class="cake-face">
                    <div class="eye"></div>
                    <div class="mouth"></div>
                    <div class="eye"></div>
                </div>
            </div>
            <div class="cake-layer-middle"></div>
            <div class="cake-layer-bottom"></div>
        </div>

        <!-- Step 1: RED Gift Box -->
        <div class="gift-container" id="gift-container">
            <div class="gift-lid"></div>
            <div class="gift-box" id="gift-box"></div>
        </div>

        <!-- Area for cards -->
        <div class="cards-display-area" id="cards-area"></div>
    </div>

    <!-- Full Screen Message Overlay -->
    <div id="message-overlay">
        <div class="message-card">
            <div class="message-text" id="overlay-text"></div>
            <div class="tap-hint">(برای بستن کلیک کن)</div>
        </div>
    </div>

    <script>
        // --- Game State & Configuration ---
        const gameState = {
            step: 0, 
            cardIndex: 0, 
            cardsOpened: 0, 
            isAnimating: false,
            finalTriggered: false
        };

        const cardsData = [
            { 
                title: "شاد", 
                text: "«امیدوارم امسال پر از خنده‌های واقعی باشه برات»",
                color: "#fff" 
            },
            { 
                title: "حمایتی", 
                text: "«امیدوارم به هر چیزی که می‌خوای برسی، چون واقعاً لایق بهترین‌هایی»",
                color: "#fff" 
            },
            { 
                title: "ملایم", 
                text: "«راستش… بودن بعضی آدما دنیا رو قشنگ‌تر می‌کنه و تو یکی از اونایی 🙂»",
                color: "#fff" 
            }
        ];

        const finalCardData = {
            title: "تولدت مبارک",
            text: "تولدت مبارک 🎂\nخوشحالم که می‌شناسمــت و امیدوارم امسال همون‌قدر که بقیه را خوشحال می‌کنی، خودت هم خوشحال باشی\nچون دیدن لبخندت واقعاً حال دنیا را بهتر می‌کند ❤️",
            isGolden: true
        };

        // --- DOM Elements ---
        const cake = document.getElementById('cake');
        const flame = document.getElementById('flame');
        const countdownEl = document.getElementById('countdown');
        const giftContainer = document.getElementById('gift-container');
        const giftBox = document.getElementById('gift-box');
        const cardsArea = document.getElementById('cards-area');
        const messageOverlay = document.getElementById('message-overlay');
        const overlayText = document.getElementById('overlay-text');
        const glowLayer = document.getElementById('glow-layer');
        const canvas = document.getElementById('effects-canvas');
        const ctx = canvas.getContext('2d');

        // --- Resize Canvas ---
        let w, h;
        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Particle System (Long Duration Physics) ---
        let particles = [];
        
        class Particle {
            constructor(type) {
                this.type = type; 
                
                this.x = w / 2;
                this.y = h / 2; 
                
                this.size = type === 'balloon' ? (Math.random() * 30 + 25) * 2 : Math.random() * 10 + 5;
                
                const hue = Math.random() * 360;
                this.color = `hsl(${hue}, 80%, 60%)`;
                
                this.gravity = 0;

                // --- VELOCITY LOGIC (HALVED SPEED & RADIUS) ---
                if (this.type === 'confetti') {
                    const angle = Math.random() * Math.PI * 2;
                    // Speed halved (from ~17.5 to ~8.75)
                    const speed = (Math.random() * 25 + 10) / 2; 
                    this.speedX = Math.cos(angle) * speed;
                    this.speedY = Math.sin(angle) * speed;
                } else {
                    // Balloons
                    // Speed halved
                    this.speedY = -(Math.random() * 15 + 15) / 2; 
                    // Radius/Spread halved
                    this.speedX = ((Math.random() - 0.5) * 15) / 2;
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.type === 'confetti') {
                    // VERY LOW GRAVITY for long float time
                    this.gravity = 0.05; 
                    // Slight swaying
                    this.x += Math.sin(this.y * 0.01) * 0.5; 
                } else {
                    // Balloons also float longer
                    this.gravity = 0.15;
                }

                this.speedY += this.gravity;
                
                if (this.type === 'confetti') {
                   this.rotation += this.rotationSpeed; 
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (this.type === 'confetti') {
                    ctx.rotate((this.rotation * Math.PI) / 180);
                }
                
                if (this.type === 'confetti') {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                } else {
                    // --- FANTASY BALLOON (Double Size) ---
                    
                    // 1. String (Doubled length)
                    ctx.beginPath();
                    ctx.moveTo(0, this.size/1.2);
                    ctx.lineTo(0, this.size/1.2 + 60);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // 2. Balloon Body
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size/2, this.size/1.2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();

                    // 3. Simple Shine
                    ctx.beginPath();
                    ctx.arc(-this.size/4, -this.size/4, this.size/10, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function startEffect(type) {
            const count = type === 'balloon' ? 30 : 200;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animateEffects() {
            ctx.clearRect(0, 0, w, h);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                // Only remove if WAY off screen (Keep them on screen longer)
                if (p.y > h + 200) {
                    particles.splice(i, 1);
                }
            }
            
            requestAnimationFrame(animateEffects);
        }
        animateEffects(); 

        // --- Step 0: Cake Interaction ---
        // CHANGE: Listening on document instead of just cake element
        document.addEventListener('click', startCountdown);

        function startCountdown(e) {
            // Prevent starting if clicking inside the overlay or gift box (handled separately)
            // But we want to start IF we are at step 0.
            if (gameState.step !== 0) return;
            
            // Stop propagation to avoid double triggering if clicking on specific elements
            // e.stopPropagation(); // Optional: depends if you want strict click-through

            gameState.isAnimating = true;

            let count = 3;
            countdownEl.classList.add('active');
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.classList.remove('active');
                    finishStep0();
                }
            }, 1000);
        }

        function finishStep0() {
            flame.classList.add('off');
            startEffect('confetti');
            startEffect('balloon');

            // CHANGE: Update text and add gold class for color change
            const cakeText = document.querySelector('.cake-overlay-text');
            if (cakeText) {
                cakeText.innerText = "تولدت مبارک";
                cakeText.classList.add('gold'); // This changes color to gold
            }

            // Delay reduced by 1 second (3500 -> 2500)
            setTimeout(() => {
                cake.classList.add('moved-aside');
                giftContainer.style.display = 'flex';
                giftContainer.animate([
                    { transform: 'scale(0)', opacity: 0 },
                    { transform: 'scale(1)', opacity: 1 }
                ], { duration: 500, fill: 'forwards' });
                
                gameState.step = 1;
                gameState.isAnimating = false;
                giftContainer.classList.add('shake');
                setTimeout(() => giftContainer.classList.remove('shake'), 2000);
            }, 2500); 
        }

        // --- Step 1: Gift Box Interaction ---
        giftBox.addEventListener('click', (e) => {
            // Prevent triggering document click (countdown) again if step logic overlaps
            e.stopPropagation(); 
            
            if (gameState.step !== 1 || gameState.isAnimating) return;
            giftContainer.classList.add('open');
            giftContainer.classList.remove('shake');
            gameState.step = 2;

            // Auto spawn sequence for the first 3 cards only
            // Card 1: Immediately
            spawnNextCard();

            // Card 2: After 800ms
            setTimeout(() => {
                if(gameState.cardIndex < 3) spawnNextCard();
            }, 800);

            // Card 3: After 1600ms
            setTimeout(() => {
                if(gameState.cardIndex < 3) spawnNextCard();
            }, 1600);
            
            // Note: Final Card is NOT spawned automatically here.
        });

        // --- Step 2: Card Logic ---
        function spawnNextCard() {
            let data;
            let isFinal = false;

            if (gameState.cardIndex < 3) {
                data = cardsData[gameState.cardIndex];
            } else if (gameState.cardIndex === 3) {
                data = finalCardData;
                isFinal = true;
            } else {
                return;
            }
            
            gameState.cardIndex++;
            createCardElement(data, isFinal);
        }

        function createCardElement(data, isFinal) {
            const card = document.createElement('div');
            
            // Apply specific classes and colors
            if (isFinal) {
                card.className = 'card golden';
            } else {
                card.className = `card card-${gameState.cardIndex - 1}`; // 0, 1, 2
            }
            
            card.innerHTML = `<span>${data.title}</span>`;
            
            card.dataset.clicked = "false";
            
            cardsArea.appendChild(card);
            card.offsetHeight; 
            card.classList.add('visible');

            card.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent body click trigger
                if (gameState.isAnimating) return;
                handleCardClick(card, data, isFinal);
            });

            if (isFinal) {
                startEffect('confetti');
            }
        }

        function handleCardClick(card, data, isFinal) {
            gameState.isAnimating = true;
            
            // Check first click
            if (card.dataset.clicked === "false") {
                card.dataset.clicked = "true";
                gameState.cardsOpened++; 
            }

            showCardMessage(data, card, isFinal, true);
        }

        function showCardMessage(data, cardElement, isFinal, triggerLogic) {
            overlayText.innerText = data.text;
            messageOverlay.classList.add('active');

            const closeHandler = () => {
                messageOverlay.classList.remove('active');
                messageOverlay.removeEventListener('click', closeHandler);
                gameState.isAnimating = false;

                if (triggerLogic && !isFinal) {
                    // After closing a regular card, check if all 3 have been clicked
                    if (gameState.cardsOpened === 3 && !gameState.finalTriggered) {
                        gameState.finalTriggered = true;
                        // Spawn Final Card
                        setTimeout(() => {
                            spawnNextCard(); 
                        }, 500);
                    }
                } else if (isFinal && !gameState.finalTriggered) {
                    // Final card closed
                    gameState.finalTriggered = true;
                    startEffect('balloon');
                    document.body.classList.add('magical-mode');
                    glowLayer.classList.add('active');
                }
            };
            messageOverlay.addEventListener('click', closeHandler);
        }
    </script>
</body>
